<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="description" content="Lernmaterial aus der GaLaBau-Umschulung / Landscaping study material: Pflanzennamen, Namen-Test, Unterrichtsthemen, Werkzeugkunde. DE/EN.">
<title>GaLaBau Lernwelt</title>
<style>
:root{
  color-scheme: light dark;
  --bg:#E4E6DF; --surface:#F4F5F0; --ink:#17211B; --muted:#5B655E; --line:#C9CFC4;
  --enamel:#1E3A2F; --on-enamel:#EFF2EA; --signal:#C4551A; --ok:#356F47; --bad:#A53526;
  --tick:rgba(23,33,27,.42); --tick2:rgba(23,33,27,.65);
  --radius:4px;
  --display:"Arial Narrow","Helvetica Neue",Arial,system-ui,sans-serif;
  --serif:Georgia,"Iowan Old Style","Times New Roman",serif;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  --body:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
@media (prefers-color-scheme:dark){:root{
  --bg:#121815; --surface:#1B231E; --ink:#E9EDE6; --muted:#96A099; --line:#2B352E;
  --enamel:#24382E; --on-enamel:#EFF2EA; --signal:#F2762F; --ok:#77BE8C; --bad:#E07A6C;
  --tick:rgba(233,237,230,.34); --tick2:rgba(233,237,230,.6);
}}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.65 var(--body);-webkit-font-smoothing:antialiased;
  overflow-x:hidden;overflow-wrap:break-word}
a{color:inherit}
:focus-visible{outline:2px solid var(--signal);outline-offset:2px;border-radius:2px}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms !important;transition-duration:.01ms !important}}

.eyebrow{font-family:var(--display);text-transform:uppercase;letter-spacing:.16em;font-size:.7rem;font-weight:700;color:var(--muted);margin:0 0 6px}
.disp{font-family:var(--display);text-transform:uppercase;letter-spacing:.04em;font-weight:700;font-stretch:condensed}
.bot{font-family:var(--serif);font-style:italic}
.mono{font-family:var(--mono)}

.bar{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.bar-in{max-width:800px;margin:0 auto;padding:11px 18px;display:flex;align-items:center;gap:10px}
.mark{display:flex;align-items:center;gap:9px;text-decoration:none;font-family:var(--display);text-transform:uppercase;letter-spacing:.08em;font-weight:700;font-size:.92rem}
.mark .chip{width:19px;height:19px;border-radius:2px;background:var(--enamel);position:relative;flex:none}
.mark .chip::after{content:"";position:absolute;inset:3px;border:1px solid rgba(239,242,234,.5);border-radius:1px}
.langtoggle{margin-left:auto;display:inline-flex;border:1px solid var(--line);border-radius:3px;overflow:hidden;flex:none}
.langtoggle button{font-family:var(--display);text-transform:uppercase;letter-spacing:.07em;font-size:.72rem;font-weight:700;
  padding:6px 9px;border:none;background:var(--surface);color:var(--muted);cursor:pointer}
.langtoggle button.on{background:var(--enamel);color:var(--on-enamel)}
.back{font-family:var(--display);text-transform:uppercase;letter-spacing:.09em;font-size:.75rem;font-weight:700;
  color:var(--muted);background:none;border:1px solid var(--line);border-radius:3px;padding:6px 11px;cursor:pointer;flex:none}
.back:hover{color:var(--ink);border-color:var(--ink)}
main{max-width:800px;margin:0 auto;padding:24px 18px 90px}
footer{max-width:800px;margin:0 auto;padding:0 18px 46px;color:var(--muted);font-size:.78rem}

.plate{background:var(--enamel);color:var(--on-enamel);border-radius:var(--radius);padding:20px 22px;position:relative}
.plate::after{content:"";position:absolute;inset:5px;border:1px solid rgba(239,242,234,.22);border-radius:2px;pointer-events:none}
.plate h1{font-family:var(--display);text-transform:uppercase;letter-spacing:.045em;font-weight:700;
  font-size:clamp(1.75rem,6.4vw,2.7rem);line-height:1.02;margin:0}
.plate .sub{font-family:var(--mono);font-size:.72rem;line-height:1.5;letter-spacing:.01em;opacity:.82;margin-top:10px}

.horizon{border-top:2px solid var(--ink);position:relative;margin:26px 0 4px}
.horizon::after{content:"";position:absolute;left:0;right:0;top:3px;border-top:1px solid var(--line)}

.board{list-style:none;margin:22px 0 0;padding:0}
.board li{border-bottom:1px solid var(--line)}
.board a{display:grid;grid-template-columns:1fr auto;gap:3px 14px;padding:16px 3px;text-decoration:none;color:inherit;align-items:baseline}
.board .n{grid-column:1;font-family:var(--display);text-transform:uppercase;letter-spacing:.05em;font-weight:700;font-size:1.16rem;line-height:1.15}
.board .c{grid-column:2;grid-row:1;text-align:right;font-family:var(--mono);font-size:.78rem;color:var(--signal);white-space:nowrap}
.board .d{grid-column:1/-1;color:var(--muted);font-size:.84rem;line-height:1.45}
.board a:hover .n,.board a:focus-visible .n{color:var(--signal)}

.sec{font-family:var(--display);text-transform:uppercase;letter-spacing:.1em;font-size:.95rem;font-weight:700;
  margin:34px 0 12px;padding-bottom:7px;border-bottom:1px solid var(--line)}
.lead{color:var(--muted);margin:.35em 0 1.3em}
.hint-note{font-size:.8rem;color:var(--muted);border-left:2px solid var(--signal);padding:7px 0 7px 11px;margin:0 0 18px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin:12px 0}
.card h3{font-family:var(--display);text-transform:uppercase;letter-spacing:.06em;font-size:.92rem;margin:0 0 .6em}
.card p{margin:.45em 0}
.card ul{margin:.45em 0;padding-left:20px}
.card li{margin:3px 0}
.card table{width:100%;border-collapse:collapse;font-size:.9rem;margin:.5em 0;display:block;overflow-x:auto}
.card th,.card td{border-bottom:1px solid var(--line);padding:7px 9px;text-align:left;vertical-align:top}
.card th{font-family:var(--display);text-transform:uppercase;letter-spacing:.07em;font-size:.7rem;color:var(--muted);white-space:nowrap}

.t{border-bottom:1px dotted var(--signal);cursor:help;position:relative}
.t:hover::after,.t.show::after{content:attr(data-en);position:absolute;left:0;bottom:132%;white-space:nowrap;
  background:var(--enamel);color:var(--on-enamel);padding:4px 9px;border-radius:3px;font-size:.76rem;font-family:var(--body);z-index:40}
.t:hover::before,.t.show::before{content:"";position:absolute;left:11px;bottom:124%;border:5px solid transparent;border-top-color:var(--enamel);z-index:40}

.qa{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 17px;margin:11px 0}
.qa .q{display:flex;gap:10px;font-weight:600;margin-bottom:10px}
.qa .q .num{font-family:var(--mono);color:var(--signal);flex:none}
.mine{width:100%;border:1px solid var(--line);border-radius:3px;background:var(--bg);color:var(--ink);
  padding:9px 11px;font:.92rem var(--body);resize:vertical;min-height:42px}
.hints{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.hint{border-left:2px solid var(--signal);padding:6px 11px;font-size:.89rem;background:color-mix(in srgb,var(--signal) 8%,transparent)}
.sol-box{margin-top:10px;border-left:2px solid var(--ok);padding:10px 13px;font-size:.94rem;background:color-mix(in srgb,var(--ok) 9%,transparent)}

.field{width:100%;padding:11px 13px;font:1rem var(--body);border:1px solid var(--line);border-radius:3px;background:var(--surface);color:var(--ink)}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin:11px 0 4px}
.chip-btn{font-family:var(--display);text-transform:uppercase;letter-spacing:.07em;font-size:.75rem;font-weight:700;
  border:1px solid var(--line);background:var(--surface);color:var(--ink);padding:7px 13px;border-radius:99px;cursor:pointer}
.chip-btn.on{background:var(--enamel);color:var(--on-enamel);border-color:var(--enamel)}
.count{font-family:var(--mono);font-size:.78rem;color:var(--muted);margin:9px 0 0}
.btn{font-family:var(--display);text-transform:uppercase;letter-spacing:.08em;font-weight:700;font-size:.8rem;
  padding:10px 16px;border-radius:3px;border:1px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer}
.btn:hover{border-color:var(--signal);color:var(--signal)}
.btn-solid{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.btn-solid:hover{background:var(--signal);border-color:var(--signal);color:#fff}
.btn:disabled{opacity:.45;cursor:default}
.btnrow{display:flex;gap:9px;flex-wrap:wrap;margin-top:12px}

.pgrid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));margin-top:16px}
.pcard{display:block;text-decoration:none;color:inherit;border-radius:var(--radius);overflow:hidden;background:var(--enamel);transition:transform .13s ease}
.pcard:hover{transform:translateY(-2px)}
.pcard .ph{display:block;width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--line)}
.pcard .noph{display:flex;align-items:center;justify-content:center;width:100%;aspect-ratio:4/3;background:var(--line);color:var(--muted);font-size:1.5rem}
.pcard .label{padding:10px 11px 11px;position:relative;color:var(--on-enamel)}
.pcard .label::after{content:"";position:absolute;left:4px;right:4px;top:2px;bottom:4px;border:1px solid rgba(239,242,234,.18);border-radius:2px;pointer-events:none}
.pcard .de{font-family:var(--display);text-transform:uppercase;letter-spacing:.035em;font-weight:700;font-size:.9rem;line-height:1.14}
.pcard .bo{font-family:var(--serif);font-style:italic;font-size:.79rem;opacity:.86;margin-top:2px;line-height:1.25}
.pcard .enn{font-size:.72rem;opacity:.72;margin-top:3px}
.flag{display:inline-block;font-family:var(--mono);font-size:.66rem;letter-spacing:.04em;margin-top:7px;padding:1px 6px;border-radius:2px}
.flag-warn{background:var(--signal);color:#fff}
.flag-ok{background:rgba(239,242,234,.16);color:var(--on-enamel)}

.dphoto{width:100%;max-height:330px;object-fit:cover;border-radius:var(--radius);background:var(--line);display:block}
.photocredit{font-family:var(--mono);font-size:.72rem;color:var(--muted);margin:6px 0 0}
.photocredit a{color:var(--muted)}
.dplate{margin-top:14px}
.dplate .de{font-family:var(--display);text-transform:uppercase;letter-spacing:.045em;font-weight:700;font-size:clamp(1.4rem,5vw,2rem);line-height:1.05}
.dplate .bo{font-family:var(--serif);font-style:italic;font-size:1.1rem;opacity:.9;margin-top:4px}
.dplate .enn{font-size:.92rem;opacity:.82;margin-top:6px}
.dplate .meta{font-family:var(--mono);font-size:.74rem;letter-spacing:.03em;opacity:.75;margin-top:10px}
.stake{display:inline-flex;align-items:center;gap:8px;text-decoration:none;margin-top:16px;
  font-family:var(--display);text-transform:uppercase;letter-spacing:.08em;font-weight:700;font-size:.8rem;
  background:var(--signal);color:#fff;padding:11px 17px;border-radius:3px}

.gauge{position:relative;height:38px;border:1px solid var(--line);border-radius:3px;background:var(--surface);overflow:hidden;margin-top:18px}
.gauge-fill{position:absolute;top:0;bottom:0;left:0;width:0;background:var(--signal);opacity:.9;transition:width .13s linear,background .13s linear}
.gauge-ticks{position:absolute;inset:0;pointer-events:none;
  background-image:
    repeating-linear-gradient(to right,var(--tick) 0 1px,transparent 1px 5%),
    repeating-linear-gradient(to right,var(--tick2) 0 1.5px,transparent 1.5px 25%);
  background-size:100% 8px,100% 15px;background-position:top left;background-repeat:no-repeat}
.readout{display:flex;align-items:baseline;gap:9px;margin-top:9px}
.readout .big{font-family:var(--mono);font-size:1.65rem;font-weight:600;letter-spacing:-.02em}
.readout .lbl{font-family:var(--display);text-transform:uppercase;letter-spacing:.12em;font-size:.7rem;color:var(--muted)}

.test{max-width:520px;margin:0 auto}
.test .qphoto{width:100%;max-height:250px;object-fit:contain;border-radius:var(--radius);display:block;margin-bottom:2px}
.answer-in{width:100%;padding:13px 14px;font:1.15rem var(--serif);font-style:italic;text-align:center;
  border:1px solid var(--line);border-bottom:2px solid var(--ink);border-radius:3px 3px 0 0;background:var(--surface);color:var(--ink)}
.answer-in:focus{outline:none;border-bottom-color:var(--signal)}
.verdict{margin-top:14px;padding:13px 15px;border-radius:3px;border-left:3px solid}
.verdict-ok{border-color:var(--ok);background:color-mix(in srgb,var(--ok) 12%,transparent)}
.verdict-no{border-color:var(--bad);background:color-mix(in srgb,var(--bad) 10%,transparent)}
.verdict .sol{font-family:var(--serif);font-style:italic;font-size:1.2rem;margin-top:3px}
.score{font-family:var(--mono);font-size:.8rem;color:var(--muted);text-align:center;margin-top:16px}

.nav-tools .tdimg{width:64px;padding:5px 6px}
.tdimg img{width:54px;height:54px;object-fit:contain;background:#fff;border-radius:3px;border:1px solid var(--line);display:block}
.credits{font-size:.76rem;color:var(--muted)}
.credits li{margin:2px 0}
.tag{display:inline-block;font-family:var(--mono);font-size:.7rem;border:1px solid var(--line);border-radius:2px;padding:1px 7px;margin-left:6px;color:var(--muted)}
mark{background:var(--signal);color:#fff;border-radius:2px;padding:0 3px}

/* ---- progress icon + overlay sheet ---- */
.iconbtn{font-size:1rem;line-height:1;color:var(--muted);background:none;border:1px solid var(--line);border-radius:3px;
  padding:5px 9px;cursor:pointer;flex:none}
.iconbtn:hover{color:var(--ink);border-color:var(--ink)}
.overlay{position:fixed;inset:0;z-index:50;background:rgba(10,14,11,.55);display:flex;align-items:flex-end;justify-content:center;padding:0}
.overlay[hidden]{display:none}
@media(min-width:560px){.overlay{align-items:center;padding:20px}}
.sheet{background:var(--bg);border:1px solid var(--line);border-radius:14px 14px 0 0;width:100%;max-width:520px;
  max-height:88vh;overflow:auto;padding:20px 20px 28px}
@media(min-width:560px){.sheet{border-radius:12px}}
.sheet h3{font-family:var(--display);text-transform:uppercase;letter-spacing:.08em;font-size:1.05rem;margin:0 0 4px}
.statrow{display:flex;gap:10px;margin:14px 0}
.stat{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:11px;text-align:center}
.stat .v{font-family:var(--mono);font-size:1.5rem;font-weight:600}
.stat .k{font-family:var(--display);text-transform:uppercase;letter-spacing:.08em;font-size:.62rem;color:var(--muted);margin-top:2px}
.iobox{margin-top:14px}
.iobox textarea{width:100%;min-height:64px;border:1px solid var(--line);border-radius:6px;background:var(--surface);color:var(--ink);
  font:.78rem var(--mono);padding:8px;resize:vertical}
.msg{font-size:.82rem;margin-top:8px}
.msg.ok{color:var(--ok)} .msg.bad{color:var(--bad)}

/* ---- learn / SRS ---- */
.progbar{height:8px;border-radius:99px;background:var(--surface);border:1px solid var(--line);overflow:hidden;margin:16px 0 6px}
.progbar>span{display:block;height:100%;background:var(--enamel)}
.masterbar>span{background:var(--ok)}
.learncard{max-width:520px;margin:0 auto}
.grades{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.grades button{font-family:var(--display);text-transform:uppercase;letter-spacing:.04em;font-weight:700;font-size:.72rem;
  padding:12px 4px;border-radius:4px;border:1px solid var(--line);background:var(--surface);color:var(--ink);cursor:pointer;line-height:1.2}
.grades button small{display:block;font-family:var(--mono);font-size:.62rem;color:var(--muted);margin-top:3px;letter-spacing:0}
.g-again{border-color:var(--bad)} .g-again:hover{background:color-mix(in srgb,var(--bad) 12%,transparent)}
.g-good{border-color:var(--ok)} .g-good:hover{background:color-mix(in srgb,var(--ok) 12%,transparent)}
.g-easy:hover,.g-hard:hover{border-color:var(--signal)}
.cardback{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--ok);border-radius:6px;padding:13px 15px;margin-top:12px;font-size:1rem}
.done-emo{font-size:2.4rem;text-align:center;margin:10px 0}

/* ---- typed-answer diff + meaning (learn faster) ---- */
.diffline{font-family:var(--mono);font-size:1.05rem;margin-top:12px;word-break:break-word}
.diffline .lbl{font-family:var(--display);text-transform:uppercase;letter-spacing:.08em;font-size:.62rem;color:var(--muted);display:block;margin-bottom:2px}
.d-ok{color:var(--ok)}
.d-bad{color:var(--bad);text-decoration:line-through}
.d-miss{color:var(--signal);border-bottom:2px solid var(--signal)}
.editsaway{font-family:var(--mono);font-size:.72rem;color:var(--muted);margin-top:4px;min-height:1em}
.meaningbox{background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:12px 14px;margin-top:12px;font-size:.9rem}
.meaningbox .mm{color:var(--muted);margin-top:6px}
.meaningbox b{font-family:var(--display);text-transform:uppercase;letter-spacing:.06em;font-size:.68rem;color:var(--muted);display:block;margin-bottom:3px;font-weight:700}

/* ---- image lightbox (tap to enlarge) ---- */
img.zoom{cursor:zoom-in}
.lightbox{position:fixed;inset:0;z-index:60;background:rgba(8,10,8,.93);display:flex;align-items:center;justify-content:center;padding:14px;cursor:zoom-out}
.lightbox[hidden]{display:none}
.lightbox img{max-width:100%;max-height:100%;object-fit:contain;border-radius:4px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
.lb-close{position:absolute;top:14px;right:16px;width:42px;height:42px;border-radius:99px;border:1px solid rgba(255,255,255,.45);
  background:rgba(0,0,0,.45);color:#fff;font-size:1.15rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lb-cap{position:absolute;left:0;right:0;bottom:0;padding:14px 18px calc(14px + env(safe-area-inset-bottom));color:#fff;
  font-family:var(--serif);font-style:italic;font-size:.95rem;text-align:center;background:linear-gradient(transparent,rgba(0,0,0,.55))}
</style>
</head>
<body>
<div class="bar"><div class="bar-in">
  <a class="mark" href="#/"><span class="chip"></span>GaLaBau Lernwelt</a>
  <div class="langtoggle" id="langtoggle"><button data-l="de">DE</button><button data-l="en">EN</button></div>
  <button class="iconbtn" id="progBtn" aria-label="Fortschritt">⇅</button>
  <button class="back" id="backBtn" hidden>←</button>
</div></div>
<main id="app"></main>
<div class="lightbox" id="lightbox" hidden><button class="lb-close" id="lbClose" aria-label="close">✕</button><img id="lbImg" alt=""><div class="lb-cap" id="lbCap"></div></div>
<div class="overlay" id="overlay" hidden><div class="sheet" id="sheet"></div></div>
<footer id="foot"></footer>

<script src="assets/plants.js"></script>
<script src="assets/cards.js"></script>
<script src="assets/tools.js"></script>
<script src="assets/merk.js"></script>
<script src="assets/topics.js"></script>
<script src="assets/topics_en.js"></script>
<script src="assets/namemean.js"></script>
<script src="assets/srs_cards.js"></script>
<script>
/* ================= data ================= */
const PLANTS=window.PLANTS||[];
const CARDS=window.CARDS||{};
const TOOLIMG=window.TOOLIMG||{};
const TOOLVERW_EN=window.TOOLVERW_EN||{};
const MERK=window.MERK||[];
const TOPICS=window.TOPICS||[];
const TOPICS_EN=window.TOPICS_EN||{};
const TById=Object.fromEntries(TOPICS.map(t=>[t.id,t]));
const TESTPOOL=PLANTS.filter(p=>p.cats.includes("hecke")||(p.cats.includes("trep")&&p.conf==="high"));
const NAMEMEAN=window.NAMEMEAN||{};
const SRS_CARDS=window.SRS_CARDS||[];
/* SRS item registry: typed plant-names (auto-graded) + self-rated concept cards */
const ITEMS=[
  ...TESTPOOL.map(p=>({id:"v:"+p.bot,type:"vocab",plant:p})),
  ...SRS_CARDS.map(c=>({id:c.id,type:"concept",card:c}))
];
const ITEM_BY=Object.fromEntries(ITEMS.map(it=>[it.id,it]));

const WERK=[

const app=document.getElementById("app"), backBtn=document.getElementById("backBtn"), foot=document.getElementById("foot");
backBtn.onclick=()=>{history.length>1?history.back():location.hash="#/";};
const esc=s=>(""+(s==null?"":s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const escA=s=>esc(s).replace(/"/g,"&quot;");
function hl(s,q){s=""+(s||"");if(!q)return esc(s);const i=s.toLowerCase().indexOf(q);if(i<0)return esc(s);
  return esc(s.slice(0,i))+"<mark>"+esc(s.slice(i,i+q.length))+"</mark>"+esc(s.slice(i+q.length));}
function bindTips(){document.querySelectorAll(".t").forEach(el=>{if(el._b)return;el._b=1;
  el.addEventListener("click",()=>{document.querySelectorAll(".t.show").forEach(o=>{if(o!==el)o.classList.remove("show");});el.classList.toggle("show");});});}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function applyTerms(text,terms){let out=esc(text||"");(terms||[]).forEach(tm=>{if(!tm||!tm.de)return;
  const e=esc(tm.de),i=out.indexOf(e);if(i<0)return;
  out=out.slice(0,i)+'<span class="t" data-en="'+escA(tm.en)+'">'+e+'</span>'+out.slice(i+e.length);});return out;}
/* prose: German gets hover-English tooltips; English is already translated */
function prose(de,en,terms){return LANG==="en"&&en?esc(en):applyTerms(de,terms);}
function lev(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;
  let prev=Array.from({length:n+1},(_,i)=>i),cur=new Array(n+1);
  for(let i=1;i<=m;i++){cur[0]=i;for(let j=1;j<=n;j++){const c=a[i-1]===b[j-1]?0:1;
    cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+c);}[prev,cur]=[cur,prev];}return prev[n];}
function normBot(s){return (s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"")
  .replace(/\s[×x]\s/g," ").replace(/×/g," ").replace(/[^a-z ]/g," ").replace(/\s+/g," ").trim();}
function similarity(a,b){a=normBot(a);b=normBot(b);if(!a&&!b)return 1;
  const L2=Math.max(a.length,b.length)||1;return Math.max(0,1-lev(a,b)/L2);}

function flagFor(p){
  if(p.cats.includes("trep")){
    if(p.conf==="high") return '<span class="flag flag-ok">'+t("fl_park")+'</span>';
    if(p.conf==="medium") return '<span class="flag flag-warn">'+t("fl_check")+'</span>';
    return '<span class="flag flag-warn">'+t("fl_unsure")+'</span>';
  }
  return '<span class="flag flag-ok">'+t("fl_hedge")+'</span>';
}

/* ================= storage (localStorage + in-memory fallback) ================= */
const SKEY="galabau-srs-v1";
let MEM=null;
function nowMs(){return Date.now();}
function readStore(){
  if(MEM) return MEM;
  try{const s=localStorage.getItem(SKEY);if(s)MEM=JSON.parse(s);}catch(e){}
  if(!MEM||typeof MEM!=="object"||!MEM.items) MEM={v:1,items:{},updated:0};
  return MEM;
}
function saveStore(){const o=readStore();o.updated=nowMs();try{localStorage.setItem(SKEY,JSON.stringify(o));}catch(e){}}

/* ================= spaced-repetition engine (SM-2-lite / Leitner) ================= */
const DAY=86400000;
const IVL=[0,1,3,7,16,35,90];   /* days by level; tuned per the retention research */
const MASTER=5, NEW_PER_SESSION=8, SESSION_MAX=20, RELEARN_MS=9*60000;
function ivlMs(l){return l<=0?RELEARN_MS:IVL[Math.min(l,IVL.length-1)]*DAY;}
function grade(id,g){/* g: 0 again,1 hard,2 good,3 easy */
  const S=readStore();const cur=S.items[id]||{l:0,r:0,lp:0};let l=cur.l||0;
  if(g===0){l=0;cur.lp=(cur.lp||0)+1;}
  else if(g===1){l=Math.max(1,l);}
  else if(g===2){l=l+1;}
  else{l=l+2;}
  l=Math.min(l,IVL.length-1);
  cur.l=l;cur.r=(cur.r||0)+1;cur.seen=1;
  cur.due=nowMs()+((g===1&&l>0)?ivlMs(l)*0.6:ivlMs(l));
  S.items[id]=cur;saveStore();
}
function srsCounts(){
  const S=readStore(),now=nowMs();let due=0,learned=0,seen=0;
  for(const it of ITEMS){const s=S.items[it.id];if(s){seen++;if((s.l||0)>=MASTER)learned++;if((s.due||0)<=now)due++;}}
  return {due,learned,seen,newAvail:ITEMS.length-seen,total:ITEMS.length};
}
function buildQueue(addNew){
  const S=readStore(),now=nowMs();
  const due=ITEMS.filter(it=>{const s=S.items[it.id];return s&&(s.due||0)<=now;})
    .sort((a,b)=>(S.items[a.id].due||0)-(S.items[b.id].due||0));
  let q=due.slice(0,SESSION_MAX);
  if(addNew||q.length===0){q=q.concat(ITEMS.filter(it=>!S.items[it.id]).slice(0,NEW_PER_SESSION));}
  return shuffle(q).slice(0,SESSION_MAX);
}

/* ================= typed-answer feedback: letter diff + name meaning ================= */
function alignOps(a,b){
  const eq=(x,y)=>x.toLowerCase()===y.toLowerCase();
  const m=a.length,n=b.length,dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=0;i<=m;i++)dp[i][0]=i;
  for(let j=0;j<=n;j++)dp[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){const c=eq(a[i-1],b[j-1])?0:1;
    dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+c);}
  let i=m,j=n;const ops=[];
  while(i>0||j>0){
    if(i>0&&j>0&&dp[i][j]===dp[i-1][j-1]+(eq(a[i-1],b[j-1])?0:1)){ops.push({op:eq(a[i-1],b[j-1])?"match":"sub",a:a[i-1],b:b[j-1]});i--;j--;}
    else if(i>0&&dp[i][j]===dp[i-1][j]+1){ops.push({op:"ins",a:a[i-1]});i--;}
    else{ops.push({op:"del",b:b[j-1]});j--;}
  }
  return ops.reverse();
}
function editsAwayText(user,bot){const u=normBot(user);if(!u)return "";const d=lev(u,normBot(bot));
  return d<=0?"":d+" "+(d===1?t("edits1"):t("editsN"));}
function feedbackHTML(userText,bot){
  const ops=alignOps((userText||"").trim(),bot);
  const sp=ch=>ch===" "?" ":esc(ch);
  const target=ops.filter(o=>o.op!=="ins").map(o=>'<span class="'+(o.op==="match"?"d-ok":"d-miss")+'">'+sp(o.b)+'</span>').join("");
  const yours=ops.filter(o=>o.op!=="del").map(o=>'<span class="'+(o.op==="match"?"d-ok":"d-bad")+'">'+sp(o.a)+'</span>').join("");
  const nm=NAMEMEAN[bot];let mean="";
  if(nm){const meaning=L(nm.meaning_de,nm.meaning_en),mn=L(nm.mnemonic_de,nm.mnemonic_en);
    if(meaning) mean='<div class="meaningbox"><b>'+t("nm_head")+'</b>'+esc(meaning)+
      (mn?'<div class="mm"><b>'+t("mn_head")+'</b>'+esc(mn)+'</div>':"")+'</div>';}
  return '<div class="diffline"><span class="lbl">'+t("correct_w")+'</span>'+target+'</div>'+
    ((userText||"").trim()?'<div class="diffline"><span class="lbl">'+t("yourans")+'</span>'+yours+'</div>':"")+mean;
}

      '<div class="stat"><div class="v">'+c.learned+'</div><div class="k">'+t("st_learned")+'</div></div>'+
      '<div class="stat"><div class="v">'+c.seen+'</div><div class="k">'+t("st_seen")+'</div></div>'+
      '<div class="stat"><div class="v">'+c.due+'</div><div class="k">'+t("st_due")+'</div></div></div>'+
    '<div class="btnrow"><button class="btn btn-solid" id="ioExport">'+t("io_export")+'</button>'+
      '<label class="btn" style="cursor:pointer">'+t("io_import_file")+'<input type="file" id="ioFile" accept="application/json,.json" hidden></label></div>'+
    '<div class="iobox"><textarea id="ioPaste" placeholder="'+escA(t("io_paste"))+'"></textarea>'+
      '<div class="btnrow"><button class="btn" id="ioApply">'+t("io_apply")+'</button>'+
      '<button class="btn" id="ioReset">'+t("io_reset")+'</button>'+
      '<button class="btn" id="ioClose" style="margin-left:auto">'+t("io_close")+'</button></div>'+
      '<div class="msg" id="ioMsg"></div></div>';
  ov.hidden=false;const msg=document.getElementById("ioMsg");
  document.getElementById("ioExport").onclick=exportProgress;
  document.getElementById("ioFile").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>applyImport(r.result,msg);r.readAsText(f);};
  document.getElementById("ioApply").onclick=()=>applyImport(document.getElementById("ioPaste").value,msg);
  document.getElementById("ioReset").onclick=()=>{if(window.confirm(t("io_reset_confirm"))){MEM={v:1,items:{},updated:nowMs()};saveStore();msg.className="msg ok";msg.textContent=t("io_reset_ok");const v=document.querySelectorAll(".sheet .stat .v");v[0].textContent=0;v[1].textContent=0;v[2].textContent=0;}};
  document.getElementById("ioClose").onclick=closePanel;
}
function closePanel(){document.getElementById("overlay").hidden=true;const h=location.hash||"#/";if(h==="#/"||h==="#/lernen")render();}
document.getElementById("progBtn").onclick=openPanel;
document.getElementById("overlay").addEventListener("click",e=>{if(e.target.id==="overlay")closePanel();});

/* ================= image lightbox ================= */
function openLightbox(src,cap){const lb=document.getElementById("lightbox");
  document.getElementById("lbImg").src=src;document.getElementById("lbCap").textContent=cap||"";lb.hidden=false;}
function closeLightbox(){const lb=document.getElementById("lightbox");if(lb.hidden)return;lb.hidden=true;document.getElementById("lbImg").removeAttribute("src");}
document.addEventListener("click",e=>{const z=e.target.closest("img.zoom");if(z){e.preventDefault();openLightbox(z.getAttribute("src"),z.getAttribute("data-cap")||z.getAttribute("alt"));}});
document.getElementById("lightbox").addEventListener("click",closeLightbox);
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeLightbox();});

syncLangUI();
render();
</script>
</body>
